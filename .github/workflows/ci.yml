name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Types + Tests + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npx vitest run
        env:
          VITE_CLIENT_SUPABASE_URL: https://placeholder.supabase.co
          VITE_CLIENT_SUPABASE_ANON_KEY: placeholder
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

      - name: Build
        run: npx vite build
        env:
          VITE_CLIENT_SUPABASE_URL: https://placeholder.supabase.co
          VITE_CLIENT_SUPABASE_ANON_KEY: placeholder
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
